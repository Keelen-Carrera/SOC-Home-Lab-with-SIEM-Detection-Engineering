#   <rule id="100007" level="8">
#     <if_group>windows</if_group>
#     <field name="win.system.eventID">4698</field>
#     <description>Persistence: scheduled task created (Event ID 4698)</description>
#     <mitre>
#       <id>T1053.005</id>
#     </mitre>
#     <group>persistence,scheduled_task,</group>
#   </rule>
#
#   <!-- Vector 2: Task XML contains suspicious scripting or LOLBin -->
#   <rule id="100008" level="13">
